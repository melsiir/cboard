name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: tools platform-tools build-tools-33.0.0 platforms-android-33

    - name: Grant execute permission for gradlew
      run: chmod +x ./cboard/gradlew

    - name: Validate Gradle wrapper
      working-directory: ./cboard
      run: ./gradlew --version

    - name: Build Debug APK
      working-directory: ./cboard
      run: |
        ./gradlew assembleDebug --no-daemon
      env:
        JAVA_OPTS: -Xmx2048m

    - name: Build Release APK (unsigned)
      working-directory: ./cboard
      run: |
        ./gradlew assembleRelease --no-daemon
      env:
        JAVA_OPTS: -Xmx2048m

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: cboard-debug-apk
        path: ./cboard/app/build/outputs/apk/debug/app-debug.apk

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: cboard-release-apk
        path: ./cboard/app/build/outputs/apk/release/app-release-unsigned.apk